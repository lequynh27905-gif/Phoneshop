{% extends 'base.html' %}

{% block title %}Đăng nhập - Phone Shop{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card">
                <div class="card-body">
                    <h2 class="text-center mb-4">Đăng nhập</h2>
                    
                    <form method="post">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label for="id_username" class="form-label">Tên đăng nhập</label>
                            <input type="text" class="form-control" id="id_username" name="username" required autofocus>
                        </div>
                        <div class="mb-3">
                            <label for="id_password" class="form-label">Mật khẩu</label>
                            <input type="password" class="form-control" id="id_password" name="password" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Đăng nhập</button>
                    </form>

                    <hr>

                    <p class="text-center">
                        Chưa có tài khoản? <a href="{% url 'store:register' %}">Đăng ký ngay</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
